services:
  frontend:
    image: node:18-alpine
    container_name: react-app
    working_dir: /app
    ports:
      - "12003:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - HOST=0.0.0.0
    stdin_open: true
    tty: true
    command: sh -c "npm install && npm start"